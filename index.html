  // ── GOOGLE DRIVE SYNC ──
  var DRIVE_CLIENT_ID = "897218286399-lc7vup0et802hb0i6j9c4kphlp4vrjvl.apps.googleusercontent.com";
  var DRIVE_SCOPES = "https://www.googleapis.com/auth/drive.appdata";
  var DRIVE_FILE_NAME = "tracker-data.json";
  var driveToken = null;

  function driveAuth(callback) {
    if (typeof google === "undefined" || !google.accounts) {
      ui.msg = "\u274c Google API \u043d\u0435 \u0437\u0430\u0433\u0440\u0443\u0437\u0438\u043b\u0441\u044f"; ui.msgCls = "err"; draw();
      setTimeout(function(){ ui.msg=""; draw(); }, 3000);
      return;
    }
    var client = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope: DRIVE_SCOPES,
      callback: function(resp) {
        if (resp.error) {
          ui.msg = "\u274c \u041e\u0448\u0438\u0431\u043a\u0430 \u0430\u0432\u0442\u043e\u0440\u0438\u0437\u0430\u0446\u0438\u0438"; ui.msgCls = "err"; draw();
          setTimeout(function(){ ui.msg=""; draw(); }, 3000);
          return;
        }
        driveToken = resp.access_token;
        callback();
      }
    });
    client.requestAccessToken();
  }

  function driveFetch(url, opts) {
    opts = opts || {};
    opts.headers = opts.headers || {};
    opts.headers["Authorization"] = "Bearer " + driveToken;
    return fetch(url, opts).then(function(r) { return r.json(); });
  }

  function driveFindFile(callback) {
    driveFetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27" + DRIVE_FILE_NAME + "%27&fields=files(id,name,modifiedTime)&orderBy=modifiedTime%20desc&pageSize=1")
      .then(function(data) { callback(data.files && data.files.length > 0 ? data.files[0] : null); })
      .catch(function() { callback(null); });
  }

  window.ptDriveSave = function() {
    ui.msg = "\u23F3 \u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0430\u044e\u0441\u044c..."; ui.msgCls = ""; draw();
    driveAuth(function() {
      ui.msg = "\u23F3 \u0421\u043e\u0445\u0440\u0430\u043d\u044f\u044E..."; draw();
      save(); // update savedAt
      var jsonStr = JSON.stringify(state, null, 2);
      driveFindFile(function(existing) {
        var metadata = { name: DRIVE_FILE_NAME, mimeType: "application/json" };
        var boundary = "----tracker" + Date.now();
        var body = "--" + boundary + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" + JSON.stringify(metadata) + "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + jsonStr + "\r\n--" + boundary + "--";

        var url, method;
        if (existing) {
          url = "https://www.googleapis.com/upload/drive/v3/files/" + existing.id + "?uploadType=multipart";
          method = "PATCH";
        } else {
          metadata.parents = ["appDataFolder"];
          body = "--" + boundary + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" + JSON.stringify(metadata) + "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + jsonStr + "\r\n--" + boundary + "--";
          url = "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
          method = "POST";
        }

        fetch(url, {
          method: method,
          headers: { "Authorization": "Bearer " + driveToken, "Content-Type": "multipart/related; boundary=" + boundary },
          body: body
        }).then(function(r) { return r.json(); }).then(function(data) {
          if (data.id) {
            ui.msg = "\u2705 \u0421\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u043e \u043d\u0430 Drive!"; ui.msgCls = "";
          } else {
            ui.msg = "\u274c \u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u044f"; ui.msgCls = "err";
          }
          draw(); setTimeout(function(){ ui.msg=""; draw(); }, 3000);
        }).catch(function() {
          ui.msg = "\u274c \u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u0435\u0442\u0438"; ui.msgCls = "err";
          draw(); setTimeout(function(){ ui.msg=""; draw(); }, 3000);
        });
      });
    });
  };

    driveAuth(function() {

  function renderCard(p, idx, isActive) {
    var exp = ui.exp[p.id];
    var isTop = p.priority && p.priority.indexOf("\u2116") >= 0;
    var cls = "card";
    if (isTop) cls += " top";
    if (p.archived) cls += " dead";

    var h = '<div class="' + cls + '">';
    h += '<div class="card-head" onclick="ptToggle(\'' + p.id + '\')">';
    h += '<span class="card-emoji">' + p.emoji + '</span>';
    h += '<span class="card-name">' + esc(p.title) + '</span>';
    if (p.priority) h += '<span class="badge' + (isTop?' top':'') + '">' + esc(p.priority) + '</span>';
    if (isActive) {
      h += '<span class="arrows" onclick="event.stopPropagation()">';
      h += '<button onclick="ptMove(' + idx + ',-1)">\u25B2</button>';
      h += '<button onclick="ptMove(' + idx + ',1)">\u25BC</button>';
      h += '</span>';
    }
    h += '<span class="chevron">' + (exp ? '\u25B2' : '\u25BC') + '</span>';
    h += '</div>';

    if (!exp && p.next) {
      h += '<div class="preview">\u2192 ' + esc(p.next) + '</div>';
    }

    if (exp) {
      h += '<div class="body">';
      for (var fi = 0; fi < FIELDS.length; fi++) {
        var f = FIELDS[fi];
        var val = p[f.k];
        if (!val && f.k === "notes") continue;
        h += '<div class="fld"><div class="fld-lbl">' + f.l + '</div>';
        if (ui.ed === p.id + "." + f.k) {
          h += '<div class="edit-row"><textarea id="ed-ta" rows="2" onkeydown="ptEdKey(event)">' + esc(ui.ev) + '</textarea>';
          h += '<div class="edit-btns"><button class="btn-ok" onclick="ptSaveEdit()">\u2713</button><button class="btn-cancel" onclick="ptCancelEdit()">\u2715</button></div></div>';
        } else {
          h += '<div class="fld-val' + (f.k==="next"?" next":"") + '" onclick="ptStartEdit(\'' + p.id + '\',\'' + f.k + '\')">' + esc(val||"\u2014") + '</div>';
        }
        h += '</div>';
      }

      var td = p.lastTouched ? '<b style="color:#aaa">' + esc(p.lastTouched) + '</b>' : '<span style="color:#555">\u2014</span>';
      h += '<div class="foot"><span class="date">\u041a\u0430\u0441\u0430\u043d\u0438\u0435: ' + td + '</span>';
      if (!p.archived) h += '<button class="btn" onclick="ptUpdate(\'' + p.id + '\',\'lastTouched\',\'' + today() + '\')">\u270B</button>';
      h += '<button class="btn hist" onclick="ptShowModal(\'' + p.id + '\')">\u0418\u0441\u0442\u043e\u0440\u0438\u044f</button>';
      h += '<span class="spacer"></span>';
      if (p.archived) h += '<button class="btn revive" onclick="ptRestore(\'' + p.id + '\')">\u0412\u0435\u0440\u043d\u0443\u0442\u044c</button>';
      else h += '<button class="btn kill" onclick="ptArchive(\'' + p.id + '\')">\u041d\u0430 \u043a\u043b\u0430\u0434\u0431\u0438\u0449\u0435</button>';
      h += '</div></div>';
    }

    h += '</div>';
    return h;
  }

          h += '<div class="hist-item"><div class="hist-date">' + esc(me.date) + ' \u2014 <span style="color:#888">' + esc(me.fl) + '</span></div>';
          h += '<div class="hist-old">\u0411\u044b\u043b\u043e: <span>' + esc(me.ov||"\u2014") + '</span></div>';
          h += '<div class="hist-new">\u0421\u0442\u0430\u043b\u043e: <span>' + esc(me.nv||"\u2014") + '</span></div></div>';
        }
      }
      h += '</div></div>';
    }

    app.innerHTML = h;
  }

  init();
})();
</script>
</body>
</html>
